<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-label="Bus driving to Garden Centre Resort at sunrise">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7ec8f7"/>
      <stop offset="0.7" stop-color="#ffe9b8"/>
      <stop offset="1" stop-color="#ffd28a"/>
    </linearGradient>
    <linearGradient id="poolGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4fc3f7"/>
      <stop offset="1" stop-color="#0288d1"/>
    </linearGradient>
    <linearGradient id="busGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2196f3"/>
      <stop offset="1" stop-color="#0d47a1"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="900" height="300" fill="url(#skyGrad)" rx="18"/>
  <!-- sun -->
  <circle cx="740" cy="80" r="38" fill="#ffca28">
    <animate attributeName="r" values="38;42;38" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="740" cy="80" r="52" fill="#ffca28" opacity="0.3">
    <animate attributeName="r" values="52;60;52" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- hills -->
  <ellipse cx="150" cy="300" rx="320" ry="90" fill="#81c784"/>
  <ellipse cx="750" cy="310" rx="380" ry="100" fill="#66bb6a"/>
  <ellipse cx="450" cy="330" rx="500" ry="110" fill="#4caf50"/>

  <!-- resort building -->
  <g>
    <rect x="600" y="120" width="180" height="110" rx="6" fill="#fff8e1" stroke="#d7b98a" stroke-width="2"/>
    <polygon points="590,124 690,70 790,124" fill="#e65100"/>
    <rect x="620" y="145" width="28" height="28" rx="3" fill="#4fc3f7" stroke="#90a4ae"/>
    <rect x="676" y="145" width="28" height="28" rx="3" fill="#4fc3f7" stroke="#90a4ae"/>
    <rect x="732" y="145" width="28" height="28" rx="3" fill="#4fc3f7" stroke="#90a4ae"/>
    <rect x="662" y="185" width="36" height="45" rx="3" fill="#6d4c41"/>
    <text x="690" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">GARDEN CENTRE</text>
    <text x="690" y="243" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d4037">RESORT 🌳</text>
  </g>

  <!-- palm trees -->
  <g>
    <rect x="560" y="170" width="9" height="60" rx="4" fill="#8d6e63"/>
    <path d="M564 172 C540 150 520 155 510 165 C530 168 550 172 564 176 Z" fill="#2e7d32"/>
    <path d="M564 172 C588 150 608 155 618 165 C598 168 578 172 564 176 Z" fill="#388e3c"/>
    <path d="M564 172 C556 145 540 135 528 135 C542 148 556 162 564 174 Z" fill="#43a047"/>
    <path d="M564 172 C572 145 588 135 600 135 C586 148 572 162 564 174 Z" fill="#2e7d32"/>
  </g>
  <g transform="translate(255,15) scale(0.8)">
    <rect x="560" y="170" width="9" height="60" rx="4" fill="#8d6e63"/>
    <path d="M564 172 C540 150 520 155 510 165 C530 168 550 172 564 176 Z" fill="#2e7d32"/>
    <path d="M564 172 C588 150 608 155 618 165 C598 168 578 172 564 176 Z" fill="#388e3c"/>
    <path d="M564 172 C556 145 540 135 528 135 C542 148 556 162 564 174 Z" fill="#43a047"/>
  </g>

  <!-- swimming pool -->
  <ellipse cx="460" cy="255" rx="95" ry="24" fill="url(#poolGrad)" stroke="#b3e5fc" stroke-width="4"/>
  <path d="M390 252 q18 -8 36 0 q18 8 36 0 q18 -8 36 0" stroke="#e1f5fe" stroke-width="3" fill="none" opacity="0.8">
    <animate attributeName="d" values="M390 252 q18 -8 36 0 q18 8 36 0 q18 -8 36 0;M390 252 q18 8 36 0 q18 -8 36 0 q18 8 36 0;M390 252 q18 -8 36 0 q18 8 36 0 q18 -8 36 0" dur="3s" repeatCount="indefinite"/>
  </path>
  <text x="460" y="262" text-anchor="middle" font-size="16">🏊</text>

  <!-- road -->
  <rect x="0" y="268" width="900" height="32" fill="#546e7a" rx="10"/>
  <g fill="#eceff1">
    <rect x="20" y="282" width="40" height="5" rx="2"/>
    <rect x="110" y="282" width="40" height="5" rx="2"/>
    <rect x="200" y="282" width="40" height="5" rx="2"/>
    <rect x="290" y="282" width="40" height="5" rx="2"/>
    <rect x="380" y="282" width="40" height="5" rx="2"/>
    <rect x="470" y="282" width="40" height="5" rx="2"/>
    <rect x="560" y="282" width="40" height="5" rx="2"/>
    <rect x="650" y="282" width="40" height="5" rx="2"/>
    <rect x="740" y="282" width="40" height="5" rx="2"/>
    <rect x="830" y="282" width="40" height="5" rx="2"/>
  </g>

  <!-- bus (animated, driving toward the resort) -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="-160 0; 950 0" dur="14s" repeatCount="indefinite"/>
    <rect x="0" y="215" width="150" height="55" rx="12" fill="url(#busGrad)"/>
    <rect x="10" y="225" width="26" height="20" rx="4" fill="#bbdefb"/>
    <rect x="44" y="225" width="26" height="20" rx="4" fill="#bbdefb"/>
    <rect x="78" y="225" width="26" height="20" rx="4" fill="#bbdefb"/>
    <rect x="112" y="225" width="28" height="26" rx="4" fill="#bbdefb"/>
    <text x="62" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#fff">BJIT · ONE TEAM 💙</text>
    <circle cx="35" cy="272" r="11" fill="#263238"/>
    <circle cx="35" cy="272" r="5" fill="#90a4ae"/>
    <circle cx="115" cy="272" r="11" fill="#263238"/>
    <circle cx="115" cy="272" r="5" fill="#90a4ae"/>
  </g>
</svg>
